function saveGame(show=false){localStorage.setItem(STORE_KEY,JSON.stringify(state));if(show)console.log('Saved')}function loadGame(){let raw=localStorage.getItem(STORE_KEY);if(raw){state=JSON.parse(raw);migrate();rankTeams()}else newGame('arkansas')}function migrate(){state.version=3;state.depth=state.depth||{};state.facilities=state.facilities||defFacilities(userTeam());state.awards=state.awards||[];state.draft=state.draft||[];state.offers=state.offers||[];state.retention=state.retention||[];state.rivalry=state.rivalry||{};state.playoff=state.playoff||null;state.confTitles=state.confTitles||[];state.carousel=state.carousel||[];state.records=state.records||defaultRecords();Object.values(state.rosters).flat().forEach(p=>{p.stats=p.stats||newStats();p.career=p.career||newStats();p.injury=p.injury||0})}

  function generateRetention(){let ef=effects();state.retention=[];(state.rosters[state.userTeam]||[]).filter(p=>p.cls!=='SR'&&p.ovr>=78).forEach(p=>{let startersIds=new Set(Object.values(starters()).flat().map(x=>x.id));let risk=clamp((100-p.morale)+(!startersIds.has(p.id)?18:0)+(p.promise==='playing_time'?18:0)-ef.retention,0,100);if(risk>35||p.ovr>=86){state.retention.push({id:p.id,name:p.name,pos:p.pos,ovr:p.ovr,risk,ask:Math.round((65000+p.ovr*5500+risk*2200)/10000)*10000,paid:false,transferred:false})}});if(state.retention.length)pushNews(state.retention.length+' key player(s) want NIL/role conversations before offseason ends.','gold')}
function payRetention(id){let d=state.retention.find(x=>x.id===id);if(!d||d.paid)return;if(state.programCash<d.ask){alert('Not enough cash/NIL.');return}state.programCash-=d.ask;d.paid=true;let p=state.rosters[state.userTeam].find(x=>x.id===id);if(p)p.morale=clamp(p.morale+18,1,99);pushNews(d.name+' accepts the retention package and stays bought in.','good');saveGame(false);render()}
function runCarousel(){state.carousel=[];state.teams.forEach(t=>{if(t.id===state.userTeam)return;let bad=t.losses>=8&&t.prestige>74,heat=t.coach.heat+(t.losses*8)-(t.wins*5);if(bad||heat>88){let old=t.coach.name;t.coach={name:pname(),rating:rand(58,90),heat:45,years:0};state.carousel.push({school:t.name,old,new:t.coach.name});pushNews(t.name+' fires '+old+' and hires '+t.coach.name+'.','bad')}else{t.coach.heat=clamp(heat,0,100);t.coach.years++}})}
function generateJobOffers(){state.offers=[];let ut=userTeam(),perf=ut.wins*12-ut.losses*8+state.coach.level*3+(ut.rank?20:0)+(state.confTitles.includes(ut.id)?15:0);if(perf>92){state.offers=state.teams.filter(t=>t.id!==ut.id&&t.prestige>=ut.prestige-6&&t.prestige<=ut.prestige+14).sort(()=>Math.random()-.5).slice(0,3).map(t=>({id:t.id,school:t.name,prestige:t.prestige,conf:t.conf,cash:2000000+t.prestige*45000}));if(state.offers.length)pushNews('Your agent says multiple schools are sniffing around. Job offers are on the Coach page.','gold')}if(state.coach.jobSecurity<12&&ut.losses>=8){let fallback=state.teams.filter(t=>t.prestige<ut.prestige&&t.id!==ut.id).sort((a,b)=>a.prestige-b.prestige).slice(0,3);state.offers=fallback.map(t=>({id:t.id,school:t.name,prestige:t.prestige,conf:t.conf,cash:1200000+t.prestige*30000,fired:true}));pushNews('Your AD is ready to move on. Take a lower job or hard reset the mess.','bad')}};
function acceptJob(id){let old=userTeam().name;state.userTeam=id;state.facilities=defFacilities(team(id));state.staff=defStaff();state.depth[id]=makeDepth(id);state.schedule=makeSchedule(id);state.offers=[];state.retention=[];state.coach.jobSecurity=68;pushNews(state.coach.name+' leaves '+old+' and takes the '+team(id).name+' job.','gold');saveGame(false);render()}
function runOffseason(){let ef=effects(),ut=userTeam(),roster=state.rosters[ut.id],retained=new Set(state.retention.filter(x=>x.paid).map(x=>x.id)),forcedTransfer=[];state.retention.forEach(d=>{if(!d.paid&&Math.random()<d.risk/115){forcedTransfer.push(d.id);d.transferred=true;pushNews(d.name+' rejects the room and enters the portal.','bad')}});let leaving=roster.filter(p=>p.cls==='SR'),draft=[];leaving.forEach(p=>{let round=draftRound(p);if(round){let c=compFor(p);draft.push({season:state.season,school:ut.name,name:p.name,pos:p.pos,ovr:p.ovr,round,ceiling:c.ceiling,pro:c.pro,floor:c.floor});pushNews(p.name+' drafted in Round '+round+' as a '+p.pos+'. Pro comp: '+c.pro+'.','gold')}});state.draft=state.draft.concat(draft).slice(-260);let startersIds=new Set(Object.values(starters()).flat().map(p=>p.id)),transfers=[];roster.filter(p=>p.cls!=='SR'&&!startersIds.has(p.id)&&!retained.has(p.id)).forEach(p=>{let chance=(100-p.morale)/330+(p.promise==='playing_time'?.18:0)+(p.ovr>78?.04:0)-(ef.retention||0)/1000;if(Math.random()<chance)transfers.push(p)});forcedTransfer.forEach(id=>{let p=roster.find(x=>x.id===id);if(p&&!transfers.includes(p))transfers.push(p)});transfers.forEach(p=>pushNews(p.name+' leaves through the transfer portal.','bad'));let commits=state.recruits.filter(r=>r.committedTo===ut.id),portalAdds=state.portal.filter(p=>p.committedTo===ut.id);state.rosters[ut.id]=roster.filter(p=>p.cls!=='SR'&&!transfers.includes(p)).map(p=>{p.cls=p.cls==='JR'?'SR':p.cls==='SO'?'JR':'SO';let jump=rand(0,5)+Math.round((ef.dev||0)/4)+(p.dev==='Elite'?4:p.dev==='Star'?3:p.dev==='Impact'?2:p.dev==='Quick'?1:0);p.ovr=clamp(p.ovr+jump,45,p.pot);p.morale=clamp(p.morale+rand(-8,8)+(ef.morale||0)/2,1,99);p.stats=newStats();p.injury=0;return p});commits.forEach(r=>state.rosters[ut.id].push({id:crypto.randomUUID(),name:r.name,pos:r.pos,cls:'FR',star:r.star,ovr:clamp(r.trueOvr+rand(-3,2),45,90),pot:r.pot,dev:pick(DEV),morale:rand(60,95),injury:0,promise:r.promise,stats:newStats(),career:newStats()}));portalAdds.forEach(p=>state.rosters[ut.id].push({id:crypto.randomUUID(),name:p.name,pos:p.pos,cls:p.cls,star:3,ovr:p.ovr,pot:p.pot,dev:pick(DEV),morale:rand(55,92),injury:0,promise:null,stats:newStats(),career:newStats()}));state.history.unshift({season:state.season,team:ut.name,wins:ut.wins,losses:ut.losses,conf:ut.confWins+'-'+ut.confLosses,rank:ut.rank,confTitle:state.confTitles.includes(ut.id),commits:commits.length,portal:portalAdds.length,transfers:transfers.length,draft:draft.length,security:state.coach.jobSecurity,champ:state.playoff?.champ===ut.id});state.season++;state.week=1;state.teams.forEach(t=>{t.wins=0;t.losses=0;t.confWins=0;t.confLosses=0;t.rank=null});Object.values(state.rosters).flat().forEach(p=>{p.stats=newStats();p.injury=0});state.confTitles=[];state.confTitleGames=[];state.retention=[];state.depth[ut.id]=makeDepth(ut.id);state.schedule=makeSchedule(ut.id);state.recruits=genRecruitClass();state.portal=genPortal();state.candidates=staffCandidates();state.recruitBudget=115;state.programCash+=1300000;pushNews('Offseason complete. '+commits.length+' freshmen, '+portalAdds.length+' transfers, '+transfers.length+' outgoing transfers.','good');rankTeams()}
function recruitingTick(){let ef=effects();state.recruits.forEach(r=>{if(r.committedTo)return;let cpu=rand(0,4)+Math.round(r.star/2);r.interest=clamp(r.interest-cpu+(r.offered?1:0),0,100);if(r.offered&&r.interest>86&&Math.random()<(.12+(ef.commit||0)/100)){r.committedTo=state.userTeam;pushNews(r.name+' commits to '+userTeam().name+'.','good')}else if(state.week>7&&Math.random()<.025*r.star&&r.interest<74){let other=pick(state.teams.filter(t=>t.id!==state.userTeam&&t.prestige>65));r.committedTo=other.id}})}
function recruitAction(id,type){let r=state.recruits.find(x=>x.id===id);if(!r||r.committedTo)return;let ef=effects(),cost={scout:10,pitch:15,offer:0,visit:35,promise:20}[type];if(state.recruitBudget<cost){alert('Not enough weekly recruiting hours.');return}state.recruitBudget-=cost;if(type==='scout')r.scouted=clamp(r.scouted+35+(ef.scout||0),0,100);if(type==='pitch')r.interest=clamp(r.interest+8+(ef.recruitBonus||0)+rand(0,5),0,100);if(type==='offer'){r.offered=true;r.interest=clamp(r.interest+5+rand(0,4),0,100)}if(type==='visit'){r.visited=true;r.interest=clamp(r.interest+16+(ef.visit||0)+rand(0,8),0,100)}if(type==='promise'){r.promise='playing_time';r.interest=clamp(r.interest+14+rand(0,6),0,100)}if(r.offered&&r.interest>=94&&Math.random()<.55){r.committedTo=state.userTeam;pushNews(r.name+' commits after a huge recruiting push.','good')}saveGame(false);render()}
  function portalAction(id){let p=state.portal.find(x=>x.id===id);if(!p||p.committedTo)return;let ef=effects(),cost=50000+p.nil*3500;if(state.programCash<cost){alert('Not enough program/NIL cash.');return}state.programCash-=cost;p.interest=clamp(p.interest+22+(ef.portal||0)+(ef.nil||0)+rand(0,12),0,100);if(p.interest>88&&Math.random()<.6){p.committedTo=state.userTeam;pushNews(p.name+' transfers in from '+p.oldTeam+'.','good')}saveGame(false);render()}
function buySkill(id){let node=null,tree=null;TREE_DEFS.forEach(tr=>{let n=tr.nodes.find(x=>x[0]===id);if(n){node=n;tree=tr}});if(!node)return;let lvl=state.coach.skills[id]||0;if(lvl>=node[3])return;let req=node[3]===1?node[4]:node[4]+lvl;if(state.coach.level<node[3]){alert('Coach level too low.');return}if(state.coach.points<req){alert('Not enough coach points.');return}state.coach.points-=req;state.coach.skills[id]=lvl+1;pushNews('Unlocked '+node[1]+' level '+(lvl+1)+' in '+tree.name+'.','good');saveGame(false);render()}

function moveDepth(pos,id,dir){let d=curDepth(),list=d[pos]||[],i=list.indexOf(id),j=i+dir;if(i<0||j<0||j>=list.length)return;[list[i],list[j]]=[list[j],list[i]];d[pos]=list;saveGame(false);render()}function autoDepth(){state.depth[state.userTeam]=makeDepth(state.userTeam);saveGame(false);render()}function swapOpponent(week,newOpp){let g=state.schedule.find(x=>x.week==week);if(!g||g.played||newOpp===state.userTeam)return;g.opp=newOpp;g.conf=team(newOpp).conf===userTeam().conf;g.rival=(userTeam().rivals||[]).includes(newOpp);saveGame(false);render()}

function renderRoster(){let r=state.rosters[state.userTeam].slice().sort((a,b)=>a.pos.localeCompare(b.pos)||b.ovr-a.ovr);return `<div class="card"><h3>Roster</h3><div class="stack">${Object.keys(POS_COUNTS).map(p=>`<span class="pill blue">${p}: ${r.filter(x=>x.pos===p).length}</span>`).join('')}</div><table class="table"><thead><tr><th>Name</th><th>Pos</th><th>Class</th><th>Stars</th><th>OVR</th><th>Potential</th><th>Dev</th><th>Morale</th><th>Injury</th></tr></thead><tbody>${r.map(p=>`<tr class="${p.injury>0?'injured':''}"><td><b>${p.name}</b>${p.promise?' <span class="pill gold">PT promise</span>':''}</td><td><span class="pos">${p.pos}</span></td><td>${p.cls}</td><td class="stars">${stars(p.star)}</td><td><b>${p.ovr}</b></td><td>${p.pot}</td><td>${p.dev}</td><td><div class="bar"><span style="width:${p.morale}%"></span></div></td><td>${p.injury>0?p.injury+' wk':'-'}</td></tr>`).join('')}</tbody></table></div>`}
function renderDepth(){let d=curDepth();return `<div class="card purple"><h3>Depth Chart</h3><p class="muted">The sim pulls stats and injury risk from these starters first.</p><button class="primary" onclick="autoDepth()">Auto Best Overall</button></div><div class="grid cols2" style="margin-top:14px">${Object.keys(STARTERS).map(pos=>{let list=(d[pos]||[]).map(id=>state.rosters[state.userTeam].find(p=>p.id===id)).filter(Boolean),others=state.rosters[state.userTeam].filter(p=>p.pos===pos&&!list.includes(p)).sort((a,b)=>b.ovr-a.ovr);list=list.concat(others);return `<div class="card"><h3>${pos} <span class="pill blue">${STARTERS[pos]} starter${STARTERS[pos]>1?'s':''}</span></h3>${list.map((p,i)=>`<div class="split newsItem ${p.injury>0?'injured':''}"><span><b>${i+1}. ${p.name}</b> <span class="pill ${i<STARTERS[pos]?'good':'blue'}">${i<STARTERS[pos]?'Starter':'Backup'}</span><span class="pill">${p.ovr} OVR</span>${p.injury>0?'<span class="pill red">Out '+p.injury+'</span>':''}</span><span><button onclick="moveDepth('${pos}','${p.id}',-1)">↑</button><button onclick="moveDepth('${pos}','${p.id}',1)">↓</button></span></div>`).join('')}</div>`}).join('')}</div>`}
  function renderRecruiting(){let list=state.recruits.slice(0,80),commits=state.recruits.filter(r=>r.committedTo===state.userTeam),needs=teamNeeds();return `<div class="grid cols3"><div class="card green"><h3>Weekly Hours</h3><div class="big">${state.recruitBudget}</div><div>Reset each week.</div></div><div class="card gold"><h3>Class Commits</h3><div class="big">${commits.length}</div><div>Avg stars ${commits.length?(commits.reduce((s,r)=>s+r.star,0)/commits.length).toFixed(1):'0.0'}</div></div><div class="card purple"><h3>Needs / Pipelines</h3><div class="stack">${Object.entries(needs).filter(x=>x[1]!=='Low').map(x=>`<span class="pill red">${x[0]} ${x[1]}</span>`).join('')||'<span class="pill good">No glaring holes</span>'}${userTeam().pipes.map(s=>`<span class="pill blue">${s}</span>`).join('')}</div></div></div><div class="grid cols2" style="margin-top:14px">${list.map(r=>{let locked=!!r.committedTo,mine=r.committedTo===state.userTeam,reveal=r.scouted>=100?`${r.trueOvr} OVR / ${r.pot} POT`:r.scouted>=50?`${r.trueOvr+rand(-4,4)} est OVR`:'Unscouted',pipe=userTeam().pipes.includes(r.state),need=needs[r.pos];return `<div class="card accentRecruit ${locked&&!mine?'dangerZone':''}"><div class="split"><h3>${r.name}</h3><span class="stars">${stars(r.star)}</span></div><div class="stack"><span class="pos">${r.pos}</span><span class="pill ${pipe?'blue':''}">${r.state}${pipe?' pipeline':''}</span><span class="pill ${need==='Major'?'red':need==='Medium'?'gold':''}">${need} need</span><span class="pill blue">${r.pitch}</span><span class="pill ${r.nil>75?'gold':''}">NIL ${r.nil}</span><span class="pill purple">${r.personality}</span>${r.promise?'<span class="pill gold">PT promise</span>':''}</div><p class="muted">Evaluation: ${reveal}</p><div class="bar"><span style="width:${r.interest}%"></span></div><div class="split small"><span>Interest ${r.interest}% • Scout ${r.scouted}%</span><b>${locked?(mine?'Committed':'Committed elsewhere'):'Open'}</b></div><div class="stack" style="margin-top:10px"><button onclick="recruitAction('${r.id}','scout')">Scout 10</button><button onclick="recruitAction('${r.id}','offer')">Offer</button><button onclick="recruitAction('${r.id}','pitch')">Pitch 15</button><button class="primary" onclick="recruitAction('${r.id}','visit')">Visit 35</button><button class="goldbtn" onclick="recruitAction('${r.id}','promise')">Promise PT 20</button></div></div>`}).join('')}</div>`}
function renderPortal(){return `<div class="card cyan"><h3>Transfer Portal</h3><p class="muted">Portal players help immediately, but NIL and role expectations can bite you later.</p></div><div class="grid cols2" style="margin-top:14px">${state.portal.map(p=>`<div class="card accentGame"><div class="split"><h3>${p.name}</h3><b>${p.ovr} OVR</b></div><div class="stack"><span class="pos">${p.pos}</span><span class="pill">${p.cls}</span><span class="pill blue">From ${p.oldTeam}</span><span class="pill gold">NIL ${p.nil}</span></div><p>${p.reason}</p><div class="bar"><span style="width:${p.interest}%"></span></div><div class="split small"><span>Interest ${p.interest}% • Potential ${p.pot}</span><b>${p.committedTo===state.userTeam?'Committed':p.committedTo?'Gone':'Open'}</b></div><button class="primary" style="margin-top:10px" onclick="portalAction('${p.id}')">Recruit ${money(50000+p.nil*3500)}</button></div>`).join('')}</div>`}
function renderRetention(){return `<div class="card gold"><h3>Retention / NIL Conversations</h3><p class="muted">Generated after postseason. Pay key players or risk losing them before offseason rollover.</p></div><div class="grid cols2" style="margin-top:14px">${state.retention.length?state.retention.map(d=>`<div class="card ${d.paid?'green':'red'}"><div class="split"><h3>${d.name}</h3><b>${d.ovr} OVR</b></div><div class="stack"><span class="pos">${d.pos}</span><span class="pill ${d.risk>65?'red':d.risk>45?'gold':'blue'}">Risk ${d.risk}%</span><span class="pill gold">Ask ${money(d.ask)}</span>${d.paid?'<span class="pill good">Paid</span>':''}</div><button class="primary" style="margin-top:10px" ${d.paid?'disabled':''} onclick="payRetention('${d.id}')">Pay / Retain</button></div>`).join(''):'<div class="card"><p class="muted">No active retention demands. They appear after postseason.</p></div>'}</div>`}
function renderCoach(){let coach=state.coach;return `<div class="grid cols3"><div class="card purple"><h3>${coach.name}</h3><div class="big">Lvl ${coach.level}</div><div>XP ${coach.xp}/${coach.level*125} • Points ${coach.points}</div></div><div class="card green"><h3>Staff Average</h3><div class="big">${Math.round(Object.values(state.staff).reduce((s,x)=>s+x.rating,0)/4)}</div><div>OC/DC/RC/SC matter.</div></div><div class="card gold"><h3>Job Offers</h3><div class="big">${state.offers.length}</div><div>${state.offers.length?'Somebody wants you.':'Win more and they will call.'}</div></div></div>${state.offers.length?`<h2>Job Offers</h2><div class="grid cols3">${state.offers.map(o=>`<div class="card gold"><h3>${o.school}</h3><div>${o.conf} • Prestige ${o.prestige}</div><div class="muted">Budget ${money(o.cash)}</div><button class="primary" onclick="acceptJob('${o.id}')">Accept Job</button></div>`).join('')}</div>`:''}<h2>Skill Trees</h2><div class="grid cols3">${TREE_DEFS.map(tr=>`<div class="skillTree"><h3>${tr.name}</h3><p class="muted small">${tr.desc}</p>${tr.nodes.map(n=>{let lvl=coach.skills[n[0]]||0,max=n[3],cost=n[4]+lvl,locked=coach.level<n[3];return `<div class="skillNode ${locked?'locked':''} ${lvl>=max?'maxed':''}"><div class="split"><b>${n[1]}</b><span>${lvl}/${max}</span></div><div class="small muted">${n[2]}</div><div class="stack" style="margin-top:8px"><span class="pill">Req Lvl ${n[3]}</span><span class="pill gold">Cost ${cost}</span></div><button style="margin-top:9px" class="${lvl>=max?'':'primary'}" onclick="buySkill('${n[0]}')">${lvl>=max?'Maxed':'Buy'}</button></div>`}).join('')}</div>`).join('')}</div><h2>Staff Room</h2><div class="grid cols4">${Object.entries(state.staff).map(([role,s])=>`<div class="card ${role==='OC'?'blue':role==='DC'?'red':role==='RC'?'green':'orange'}"><h3>${role}</h3><b>${s.name}</b><div>${s.scheme}</div><div class="big">${s.rating}</div><div class="small muted">${s.trait||'Standard'} • ${money(s.salary)}</div><button class="warn" onclick="fireStaff('${role}')">Fire</button></div>`).join('')}</div><h2>Candidates</h2><div class="grid cols4">${state.candidates.map(c=>`<div class="card"><div class="split"><h3>${c.role}</h3><b>${c.rating}</b></div><b>${c.name}</b><div>${c.scheme} • ${c.trait}</div><div class="muted">Salary ${money(c.salary)}</div><button class="primary" onclick="hireCandidate('${c.id}')">Hire</button></div>`).join('')}</div><h2>Carousel</h2><div class="card red">${state.carousel.length?state.carousel.slice(0,12).map(c=>`<div class="newsItem"><b>${c.school}</b>: ${c.old} out, ${c.new} in.</div>`).join(''):'<p class="muted">Coach firings appear after postseason.</p>'}</div>`}
function renderFacilities(){return `<div class="grid cols2">${FACILITIES.map(f=>{let lvl=state.facilities[f[0]]||0,cost=f[4]*(lvl+1);return `<div class="card facility"><div class="split"><h3>${f[1]}</h3><b>Lvl ${lvl}/${f[3]}</b></div><p class="muted">${f[2]}</p><div class="bar"><span style="width:${lvl/f[3]*100}%"></span></div><div class="split" style="margin-top:10px"><span>${lvl>=f[3]?'Maxed':'Next: '+money(cost)}</span><button class="primary" ${lvl>=f[3]?'disabled':''} onclick="upgradeFacility('${f[0]}')">Upgrade</button></div></div>`}).join('')}</div>`}
function renderRankings(){let ranks=rankTeams().slice(0,25);return `<div class="card"><h3>Top 25</h3><table class="table"><thead><tr><th>#</th><th>Team</th><th>Conf</th><th>Record</th><th>Conf</th><th>Power</th><th>Prestige</th></tr></thead><tbody>${ranks.map((t,i)=>`<tr><td><b>${i+1}</b></td><td>${t.id===state.userTeam?'<b>'+t.name+'</b>':t.name}${state.confTitles.includes(t.id)?' 🏆':''}</td><td>${t.conf}</td><td>${t.wins}-${t.losses}</td><td>${t.confWins}-${t.confLosses}</td><td>${teamPower(t.id)}</td><td>${t.prestige}</td></tr>`).join('')}</tbody></table></div>${state.playoff?`<div class="card gold" style="margin-top:14px"><h3>${state.playoff.season} Playoff Bracket</h3><div class="stack">${state.playoff.field.map((id,i)=>`<span class="pill ${id===state.playoff.champ?'gold':'blue'}">${i+1}. ${team(id).name}${id===state.playoff.champ?' 🏆':''}</span>`).join('')}</div><table class="table"><thead><tr><th>Round</th><th>Matchup</th><th>Winner</th><th>Score</th></tr></thead><tbody>${state.playoff.games.map(g=>`<tr><td>${g.label}</td><td>${team(g.a).name} vs ${team(g.b).name}</td><td><b>${team(g.winner).name}</b></td><td>${g.score}</td></tr>`).join('')}</tbody></table></div>`:''}`}
function nationalLeaders(cat){return Object.entries(state.rosters).flatMap(([tid,r])=>r.map(p=>({p,team:team(tid).name,val:p.stats[cat]||0}))).filter(x=>x.val>0).sort((a,b)=>b.val-a.val).slice(0,10)}
function renderAwards(){let latest=state.awards[0],draft=state.draft.slice().reverse().slice(0,70),leaders=['passYds','rushYds','recYds','tackles','sacks','defInts'];return `<div class="grid cols2"><div class="card gold"><h3>Latest Awards</h3>${latest?Object.entries(latest.awards).map(([k,v])=>`<div class="newsItem"><b>${k.toUpperCase()}</b>: ${v.name} • ${v.team} <span class="pos">${v.pos||'HC'}</span></div>`).join(''):'<p class="muted">Awards are calculated after postseason.</p>'}</div><div class="card blue"><h3>National Leaders</h3>${leaders.map(c=>`<div class="newsItem"><b>${c}</b>: ${nationalLeaders(c)[0]?.p.name||'-'} • ${nationalLeaders(c)[0]?.team||'-'} (${nationalLeaders(c)[0]?.val||0})</div>`).join('')}</div></div><div class="card purple" style="margin-top:14px"><h3>Draft Log / Pro Comps</h3>${draft.length?`<table class="table"><thead><tr><th>Season</th><th>School</th><th>Name</th><th>Pos</th><th>Round</th><th>Pro Comp</th><th>Ceiling</th><th>Floor</th></tr></thead><tbody>${draft.map(d=>`<tr><td>${d.season}</td><td>${d.school}</td><td><b>${d.name}</b></td><td><span class="pos">${d.pos}</span></td><td>${d.round}</td><td>${d.pro}</td><td>${d.ceiling}</td><td>${d.floor}</td></tr>`).join('')}</tbody></table>`:'<p class="muted">Draft results appear after seniors leave.</p>'}</div>`}
function renderRecords(){let label={passYds:'Passing Yards',passTD:'Passing TD',rushYds:'Rushing Yards',rushTD:'Rushing TD',recYds:'Receiving Yards',recTD:'Receiving TD',tackles:'Tackles',sacks:'Sacks',defInts:'Interceptions'};return `<div class="grid cols2"><div class="card gold"><h3>Season Records</h3>${Object.entries(state.records.season).map(([k,v])=>`<div class="newsItem"><b>${label[k]}</b>: ${v?`${v.value} — ${v.name} (${v.season})`:'-'}</div>`).join('')}</div><div class="card purple"><h3>Career Records</h3>${Object.entries(state.records.career).map(([k,v])=>`<div class="newsItem"><b>${label[k]}</b>: ${v?`${v.value} — ${v.name}`:'-'}</div>`).join('')}</div></div>`}
function renderHistory(){return `<div class="card"><h3>Program Memory</h3>${state.history.length?`<table class="table"><thead><tr><th>Season</th><th>Team</th><th>Record</th><th>Conf</th><th>Rank</th><th>Commits</th><th>Portal</th><th>Transfers</th><th>Draft</th><th>Security</th></tr></thead><tbody>${state.history.map(h=>`<tr><td>${h.season}</td><td>${h.team}${h.champ?' 🏆':''}${h.confTitle?' 🥇':''}</td><td>${h.wins}-${h.losses}</td><td>${h.conf}</td><td>${h.rank?'#'+h.rank:'UR'}</td><td>${h.commits}</td><td>${h.portal}</td><td>${h.transfers||0}</td><td>${h.draft||0}</td><td>${h.security}%</td></tr>`).join('')}</tbody></table>`:'<p class="muted">Finish a season and this fills up.</p>'}</div><div class="card cyan" style="margin-top:14px"><h3>Rivalry Memory</h3>${Object.values(state.rivalry).length?Object.values(state.rivalry).map(r=>`<div class="newsItem"><b>${team(r.a)?.name||r.a} vs ${team(r.b)?.name||r.b}</b>: ${team(r.streakTeam)?.name||r.streakTeam} has won ${r.streak} straight. ${r.games} game(s) tracked.</div>`).join(''):'<p class="muted">Rivalry streaks show once rivalry games are played.</p>'}</div><div class="card cyan" style="margin-top:14px"><h3>All News Archive</h3>${state.news.map(n=>`<div class="newsItem"><span class="pill">${n.season} W${n.week}</span> ${n.msg}</div>`).join('')}</div>`}
function openSettings(){let options=TEAM_SEED.map(t=>`<option value="${t[0]}">${t[1]}</option>`).join('');byId('modal').innerHTML=`<h2>Settings / Save Tools</h2><div class="grid cols2"><div><label>Start new dynasty</label><select id="newTeam" class="input">${options}</select><button class="warn" style="margin-top:8px" onclick="if(confirm('Start over?')) newGame(byId('newTeam').value)">New Game</button></div><div><label>Export Save JSON</label><button class="primary" style="display:block;margin-top:8px" onclick="exportSave()">Export</button><button style="margin-top:8px" onclick="document.getElementById('importBox').style.display='block'">Import</button><button class="warn" style="margin-top:8px" onclick="localStorage.removeItem(STORE_KEY);newGame('arkansas')">Hard Reset</button></div></div><div id="importBox" style="display:none;margin-top:12px"><textarea id="importText" placeholder="Paste exported JSON here"></textarea><button class="primary" onclick="importSave()">Import Save</button></div><p class="muted small">V0.3 uses a new save key, so V0.2 saves will not auto-load. Export saves if you care about keeping them.</p><button onclick="hideModal()">Close</button>`;byId('modalShade').style.display='flex'}
function hideModal(){byId('modalShade').style.display='none'}function closeModal(e){if(e.target.id==='modalShade')hideModal()}function exportSave(){let txt=JSON.stringify(state);if(navigator.clipboard)navigator.clipboard.writeText(txt);byId('modal').insertAdjacentHTML('beforeend','<textarea>'+txt.replaceAll('<','&lt;')+'</textarea><p class="pill good">Save JSON shown above and copied if clipboard is allowed.</p>')}function importSave(){try{state=JSON.parse(byId('importText').value);migrate();saveGame(false);hideModal();render()}catch(e){alert('Bad JSON.')}}
loadGame();render();
</script>
</body>
</html>
